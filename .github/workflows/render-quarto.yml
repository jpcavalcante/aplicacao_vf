name: Render Quarto → GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permissão para escrever no repo (necessário para GitHub Pages)
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instalar R
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4"
          use-public-rspm: true

      # 3. Dependências de sistema para sf / spdep / gdal
      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgdal-dev libgeos-dev libproj-dev \
            libudunits2-dev libcurl4-openssl-dev \
            libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev

      # 4. Cache de pacotes R (evita reinstalar a cada run)
      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-${{ hashFiles('**/DESCRIPTION', '.github/workflows/render-quarto.yml') }}
          restore-keys: r-pkgs-

      # 5. Instalar pacotes R
      - name: Install R packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          Rscript -e '
            pkgs <- c(
              "tidyverse", "sf", "spdep", "GWmodel",
              "MASS", "robustbase", "car", "lmtest",
              "corrplot", "ggspatial", "knitr", "kableExtra",
              "gridExtra", "scales", "readxl", "openxlsx",
              "writexl", "stringi", "purrr", "broom", "remotes", "pak"
            )
            missing <- pkgs[!pkgs %in% installed.packages()[,"Package"]]
            if (length(missing)) install.packages(missing, repos="https://cloud.r-project.org")

            # Pacotes do GitHub — usa GITHUB_PAT automaticamente via remotes
            github_pkgs <- list(
              mgwnbr  = "douglasmesquita/mgwnbr",
              gwzinbr = "douglasmesquita/gwzinbr"
            )
            for (pkg in names(github_pkgs)) {
              if (!pkg %in% installed.packages()[,"Package"]) {
                message("Instalando ", pkg, " do GitHub...")
                tryCatch(
                  remotes::install_github(
                    github_pkgs[[pkg]],
                    auth_token = Sys.getenv("GITHUB_PAT"),
                    quiet      = FALSE,
                    upgrade    = "never"
                  ),
                  error = function(e) {
                    warning("Nao foi possivel instalar ", pkg, ": ", conditionMessage(e))
                  }
                )
              }
            }
          '

      # 6. Instalar Quarto
      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # 7. Cache do Quarto/knitr (evita re-executar modelos GWR pesados)
      - name: Cache Quarto computations
        uses: actions/cache@v4
        with:
          path: _cache/
          key: quarto-cache-${{ hashFiles('index.qmd', 'dados/base_mestrado.gpkg') }}
          restore-keys: quarto-cache-

      # 8. Preparar dados (gera base_mestrado.gpkg se não existir)
      - name: Prepare data
        run: |
          if [ ! -f dados/base_mestrado.gpkg ]; then
            Rscript preparar_dados.R
          else
            echo "GeoPackage já existe, pulando preparação."
          fi

      # 9. Renderizar o documento Quarto
      - name: Render Quarto
        run: quarto render index.qmd

      # 10. Publicar docs/ no GitHub Pages (só na branch main)
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: true
